name: Daily KRX Brief Automation

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Downloader
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python krx_brief.py

      - name: Commit and Push
        run: |
          git config --global user.name "KRX Bot"
          git config --global user.email "bot@github.com"
          
          # [핵심 변경] find 명령어로 PDF 파일이 있는지 직접 확인합니다.
          if [ -n "$(find . -maxdepth 1 -name '*.pdf' -print -quit)" ]; then
            git add *.pdf
            if git diff --staged --quiet; then
              echo "변경사항 없음."
            else
              git commit -m "Add latest KRX brief"
              git push
            fi
          else
            echo "업로드할 PDF 파일이 없습니다. 종료합니다."
          fi
