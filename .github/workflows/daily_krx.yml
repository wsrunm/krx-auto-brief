name: Daily KRX Brief Automation

on:
  schedule:
    - cron: '30 8 * * 1-5' # 월~금 오후 5시 30분 (KST)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Node.js 경고 제거

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        # PDF를 이미지로 바꾸는 도구(poppler)를 서버에 설치합니다.
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install Python Packages
        run: pip install requests beautifulsoup4 pdf2image

      - name: Run Downloader and Converter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python krx_brief.py

      - name: Commit and Push
        run: |
          git config --global user.name "KRX Bot"
          git config --global user.email "bot@github.com"
          if ls *.pdf 1> /dev/null 2>&1; then
            git add *.pdf *.jpg
            if git diff --staged --quiet; then
              echo "No changes."
            else
              git commit -m "Add latest brief and image"
              git push
            fi
          fi
