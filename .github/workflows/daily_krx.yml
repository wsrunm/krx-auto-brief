name: Daily KRX Brief Automation

on:
  schedule:
    # 💡 한국 시간(KST) 평일 오후 4시 38분 설정
    # 16:38 KST - 9시간 = 07:38 UTC
    # 분(38) 시(7) 일(*) 월(*) 요일(1-5: 월~금)
    - cron: '38 7 * * 1-5'
  
  workflow_dispatch:      # 필요할 때 직접 'Run workflow' 버튼으로 실행 가능
  push:
    branches: [ "main" ]  # 코드를 수정해서 올리면 즉시 테스트 실행

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        # PDF를 이미지로 변환하기 위한 poppler-utils 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils fonts-nanum
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pdf2image google-generativeai pypdf

      - name: Install Python Packages
        run: |
          # google-genai 대신 google-generativeai를 설치합니다. (더 안정적임)
          pip install requests beautifulsoup4 pdf2image google-generativeai
      - name: Run KRX Automation
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: python krx_brief.py

      - name: Update Repository
        # 생성된 PDF 및 JPG 파일을 저장소에 커밋하여 이력 관리
        run: |
          git config --global user.name "KRX Bot"
          git config --global user.email "bot@github.com"
          if ls *.pdf 1> /dev/null 2>&1 || ls *.jpg 1> /dev/null 2>&1; then
            git add *.pdf *.jpg
            if git diff --staged --quiet; then
              echo "Nothing to commit"
            else
              git commit -m "Auto-update: Latest KRX Brief $(date +'%Y-%m-%d')"
              git push
            fi
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'action@github.com'
          
          # 1. 모든 변경사항(추가 및 삭제) 스테이징
          git add -A
          
          # 2. 변경사항이 있는지 확인 후 커밋
          if ! git diff --cached --quiet; then
            git commit -m "chore: cleanup old reports and update latest"
            
            # 3. 🚀 핵심: 원격 저장소의 최신 내용을 먼저 가져와서 합칩니다 (충돌 방지)
            git pull --rebase origin main
            
            # 4. 최종적으로 서버에 올리기
            git push
          else
            echo "No changes to commit"
          fi
